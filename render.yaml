services:
  - type: web
    name: seller-intelligence-tools-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.tools_api.app:app --host 0.0.0.0 --port $PORT --app-dir backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SCHEMA
        value: seller_intelligence
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: BUYBOX_MODEL_PATH
        value: backend/model/best_model.pkl
      - key: BUYBOX_API_URL
        sync: false
      - key: BUYBOX_API_TIMEOUT_SECONDS
        value: "8"
